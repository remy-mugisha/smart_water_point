{% extends "base.html" %}
{% block title %}Upload Data{% endblock %}
{% block content %}
<div class="content-panel">
    <h1>Upload Water Point Data</h1>
    <form method="post" enctype="multipart/form-data">
        {{ form.hidden_tag() }}
        {% include "dashboard/_upload_form_fields.html" %}
        <button class="btn btn-primary" type="submit"><i class="fa-solid fa-upload"></i> Upload</button>
    </form>
</div>
{% endblock %}
