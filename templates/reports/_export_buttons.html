{% macro export_buttons(pdf_url, excel_url) %}
<div class="export-buttons d-flex gap-2 mb-3">
  <a href="{{ pdf_url }}" class="btn btn-sm btn-outline-secondary"><i class="fa-solid fa-file-pdf"></i> PDF</a>
  <a href="{{ excel_url }}" class="btn btn-sm btn-outline-secondary"><i class="fa-solid fa-file-excel"></i> Excel</a>
  <button type="button" class="btn btn-sm btn-outline-secondary" onclick="window.print()"><i class="fa-solid fa-print"></i> Print</button>
</div>
{% endmacro %}
